version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - commentedOutCode
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - errcheck
          - unparam
        path: _test\.go
      - linters:
          - errcheck
        path: cmd/demo/
    paths:
      - third_party$
      - builtin$
      - ^examples/
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
